<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e2638"/>
      <stop offset="100%" stop-color="#0a0d14"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="48" height="48" rx="10" fill="url(#bg)"/>
  <circle cx="24" cy="24" r="8" fill="#a855f7" filter="url(#glow)" opacity="0.9"/>
  <circle cx="24" cy="24" r="14" stroke="#4da6ff" stroke-width="1.5" fill="none" stroke-dasharray="4 4" opacity="0.5"/>
  <circle cx="24" cy="24" r="20" stroke="#ec4899" stroke-width="1" fill="none" stroke-dasharray="2 6" opacity="0.3"/>
  <circle cx="16" cy="18" r="2" fill="#f97316" filter="url(#glow)" opacity="0.7"/>
  <circle cx="32" cy="28" r="1.5" fill="#4da6ff" filter="url(#glow)" opacity="0.6"/>
  <circle cx="28" cy="16" r="1" fill="#ef4444" filter="url(#glow)" opacity="0.5"/>
</svg>
